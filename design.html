    <script>
        // color switching game interactivity

        //1. select all html elements to later manipulate
        const body = document.querySelector('body')
        //document var automatically set to the html page currently open
        const colorInput = document.getElementById('color-picker')
        //document objects and its methods are generated by the Wep API of the browser
        //eg chromium uses Blink API, Firfox uses Gecko DOM
        const colorDiv = document.querySelector('.color-div')
        const hiddenText = document.querySelector('.color-div p')
        const resetBtn = document.querySelector('.color-div button')
        const playBtn = document.getElementById('play-game')

        //2. create functions
        function playGame() {
            //enables game play , shows selector color
            colorDiv.style.display = "block"
            playBtn.style.display = "none"
        };

        function changeColor() {
            //get hex input, set to background
            const selectedColor = colorInput.value 
            body.style.background = selectedColor
            resetBtn.style.display = "block"
            hiddenText.style.display = "block"
            colorInput.style.display = "none"
        };

        function resetColor() {
            // change later to tiled bg****
            body.style.background = 'white'
            colorDiv.style.display = "block"
            playBtn.style.display = 'block'

            colorInput.style.display = "inline-block";

            hiddenText.style.display = "none"
            resetBtn.style.display = 'none'
            colorDiv.style.display = 'none'
        };

        //3. assign the functions to the buttons; 
        //adding function call to the elements themselves above
    </script>
